# =============================================================================
# GodeX Configuration — DeepSeek Provider
# =============================================================================
# 快速启动: godex serve --config ./godex.deepseek.yaml
# 环境变量: export DEEPSEEK_API_KEY=<your-key>

default_provider: deepseek

models:
  aliases:
    # -------------------------------------------------------------------------
    # Codex-compatible model aliases
    # -------------------------------------------------------------------------
    gpt-5.5: "deepseek/deepseek-v4-pro"
    gpt-5.4: "deepseek/deepseek-v4-pro"
    gpt-5.4-mini: "deepseek/deepseek-v4-flash"
    gpt-5.3-codex: "deepseek/deepseek-v4-pro"
    gpt-5.3-codex-spark: "deepseek/deepseek-v4-flash"
    gpt-5.2: "deepseek/deepseek-v4-pro"

    # Fallback for unknown bare model names
    "*": "deepseek/deepseek-v4-pro"

providers:
  deepseek:
    spec: deepseek
    credentials:
      api_key: ${DEEPSEEK_API_KEY}
    endpoint:
      base_url: https://api.deepseek.com

session:
  backend: sqlite
  sqlite:
    path: ./data/sessions.deepseek.db

trace:
  enabled: true
  path: ./data/trace.deepseek.db
  capture_payload: true
  payload_max_bytes: 1048576
