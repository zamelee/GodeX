name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  checks:
    name: Typecheck, lint, test, and mock e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Verify repository is public for OIDC publishing
        if: ${{ github.event.repository.private }}
        run: |
          echo "::error::Set the GitHub repository to public before publishing via OIDC Trusted Publisher."
          exit 1
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Set version from tag
        uses: ./.github/actions/set-version
        with:
          tag: ${{ github.event.release.tag_name }}
      - name: Run checks
        run: bun run ci

  compile:
    name: Compile (${{ matrix.target }})
    needs: checks
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-latest
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set version from tag
        uses: ./.github/actions/set-version
        with:
          tag: ${{ github.event.release.tag_name }}

      - name: Compile
        run: bun run compile -- --target=${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: godex-${{ matrix.target }}
          path: platforms/${{ matrix.target }}/bin/
          retention-days: 1

  publish:
    name: Publish to npm and GitHub Release
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Set version from tag
        uses: ./.github/actions/set-version
        with:
          tag: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download all platform binaries
        uses: actions/download-artifact@v8
        with:
          pattern: godex-*
          path: platforms-tmp
          merge-multiple: false

      - name: Place binaries into platform dirs
        run: |
          for dir in platforms-tmp/*/; do
            dirname=$(basename "$dir")
            target="${dirname#godex-}"
            mkdir -p "platforms/${target}/bin"
            cp -r "$dir"* "platforms/${target}/bin/"
          done
          rm -rf platforms-tmp
          find platforms -name godex -exec chmod +x {} \; 2>/dev/null || true
          chmod +x bin/godex || true

      - name: Package GitHub Release assets
        run: |
          mkdir -p release-assets
          for target_dir in platforms/*/; do
            target=$(basename "$target_dir")
            if [[ "$target" == win32-* ]]; then
              (cd "platforms/${target}/bin" && zip -9 "$GITHUB_WORKSPACE/release-assets/godex-${target}.zip" godex.exe)
            else
              tar -C "platforms/${target}/bin" -czf "release-assets/godex-${target}.tar.gz" godex
            fi
          done
          (cd release-assets && shasum -a 256 * > SHA256SUMS)

      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish platform packages
        run: |
          for pkg in platforms/*/; do
            echo "Publishing $(basename $pkg)..."
            (cd "$pkg" && npm publish --access public)
          done

      - name: Publish main package
        run: npm publish --access public

  docker:
    name: Build and push Docker image
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/godex
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
