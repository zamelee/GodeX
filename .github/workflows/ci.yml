name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, lint, unit, and mock e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI checks
        run: bun run ci

      - name: Generate coverage
        run: bun run test:coverage -- --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  compile:
    name: Compile native binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-latest
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile
        run: bun run compile -- --target=${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: godex-${{ matrix.target }}
          path: platforms/${{ matrix.target }}/bin/
          retention-days: 1

  zhipu-live:
    name: Live Zhipu integration
    runs-on: ubuntu-latest
    needs: check
    if: ${{ github.event_name != 'pull_request' }}
    timeout-minutes: 15
    env:
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run live Zhipu tests
        if: ${{ env.ZHIPU_API_KEY != '' }}
        run: bun run test:zhipu

      - name: Skip live Zhipu tests
        if: ${{ env.ZHIPU_API_KEY == '' }}
        run: echo "ZHIPU_API_KEY is not configured; skipping live Zhipu integration tests."
