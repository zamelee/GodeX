<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root{--bg:#1e1e1e;--bg2:#252526;--bg3:#333;--border:#3c3c3c;--text:#ccc;--text2:#888;--blue:#4fc3f7;--red:rgba(255,0,0,.3);--lime:rgba(0,255,0,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:13px}
header{position:static;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;flex-shrink:0;height:40px}
header h1{font-size:15px;color:var(--blue)}
main{display:flex;flex:1 1 0;overflow:hidden;min-height:0}
#main-wrapper{display:flex;flex:1 1 0;flex-direction:column;overflow:hidden;min-height:0}
.col-left{flex:0 0 200px;min-width:120px;background:var(--bg2);padding:8px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sash-v{width:8px;height:100%;cursor:col-resize;user-select:none;background:var(--bg2);border-left:1px solid var(--border);border-right:1px solid var(--border)}
.sash-h{height:14px;width:100%;cursor:row-resize;user-select:none;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;transition:background .12s}
.sash-h:hover,.sash-h.dragging{background:#4fc3f7;opacity:0.5}
.sash-h::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:36px;height:4px;background:var(--border);border-radius:1px}
.sash-h:hover::before,.sash-h.dragging::before{background:#fff}
.col-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.forms-area{flex:1 1 0;overflow:hidden;padding:12px;display:flex;flex-direction:column;gap:0;min-height:0}
.form-section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:auto;display:flex;flex-direction:column;min-height:0;flex-shrink:0;margin:0 0 8px 0}
.form-section-head{background:rgba(255,255,255,.03);padding:8px 12px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border)}
.form-content{padding:8px}
.log-region{flex:1;display:flex;flex-direction:column;min-height:120px;background:var(--bg)}
.log-header{padding:6px 12px;background:var(--bg2);font-size:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.log-body{flex:1;padding:8px;overflow:auto;font-family:monospace;font-size:11px;color:var(--text2)}
.info-box{position:fixed;bottom:10px;right:10px;background:#4fc3f7;color:#000;padding:6px 10px;border-radius:4px;font-size:12px;z-index:999}
</style>
</head>
<body>
<header><h1>Sash-main-log 绝对定位测试</h1></header>
<div id="main-wrapper">
<main>
  <div class="col-left">
    <div style="background:var(--bg3);padding:8px;border-radius:4px">服务商列表<br><br>服务商列表</div>
  </div>
  <div class="sash-v"></div>
  <div class="col-right">
    <div class="forms-area">
      <div class="form-section" style="border-color:#f44">
        <div class="form-section-head">服务商信息</div>
        <div class="form-content">表单内容，可压缩</div>
      </div>
      <div class="form-section" style="border-color:#8f8;flex:1">
        <div class="form-section-head">已启用的模型</div>
        <div class="form-content">模型列表...</div>
      </div>
    </div>
  </div>
</main>

  <div class="sash-h" id="sash-main-log" title="拖动调整主区与日志区比例"></div>
  <div class="log-region" id="log-region">
    <div class="log-header">日志面板 (拖动上方横条)</div>
    <div class="log-body" id="log-body">
      日志内容...<br>日志内容...<br>日志内容...
    </div>
  </div>
</div>

<div class="info-box" id="info"></div>

<script>
(function(){
    var sash = document.getElementById("sash-main-log");
  var logRegion = document.getElementById("log-region");
  var mainWrapper = document.getElementById("main-wrapper");
  var info = document.getElementById("info");
  var STORAGE_KEY = "test-sash-logRatio";
  var SASH_H = 14;
  var MIN_LOG = 120, MIN_MAIN = 200;
  var drag = false;

  function wrapperH(){ return mainWrapper.offsetHeight; }

  // sash flex: 0 0 N  -> sash takes Npx, log-region (flex:1) fills the rest
  function setLogH(logH){
    sash.style.flex = "0 0 " + logH + "px";
    void mainWrapper.offsetHeight;
  }

  function loadLogH(){
    var r = parseFloat(localStorage.getItem(STORAGE_KEY));
    if(!(r >= 0.1 && r <= 0.9)) r = 0.6;
    return Math.round(r * wrapperH());
  }

  setLogH(loadLogH());
  window.addEventListener("resize", function(){ setLogH(loadLogH()); });

  sash.addEventListener("mousedown", function(e){ drag=true; e.preventDefault(); });
  document.addEventListener("mousemove", function(e){
    if(!drag) return;
    var mouseY = e.clientY - mainWrapper.getBoundingClientRect().top;
    var logH = Math.max(MIN_LOG, Math.min(wrapperH() - MIN_MAIN, mouseY));
    setLogH(logH);
    info.textContent = "logHeight: " + logH + "px | sash: " + SASH_H + "px";
  });
  document.addEventListener("mouseup", function(){
    if(!drag) return; drag=false;
    var r = parseFloat(localStorage.getItem(STORAGE_KEY));
    if(!(r >= 0.1 && r <= 0.9)) r = 0.6;
    localStorage.setItem(STORAGE_KEY, r.toFixed(4));
  });
    localStorage.setItem(STORAGE_KEY, (colRight.offsetHeight / totalH).toFixed(4));
  });
})();
</script>
</body>
</html>
