# =============================================================================
# GodeX Configuration — Xiaomi (小米) Provider
# =============================================================================
# 快速启动: godex serve --config ./godex.xiaomi.yaml
# 环境变量: export MIMO_API_KEY=<your-key>

default_provider: xiaomi

models:
  aliases:
    # -------------------------------------------------------------------------
    # Codex-compatible model aliases
    # -------------------------------------------------------------------------
    gpt-5.5: "xiaomi/mimo-v2.5-pro"
    gpt-5.4: "xiaomi/mimo-v2.5-pro"
    gpt-5.4-mini: "xiaomi/mimo-v2.5"
    gpt-5.3-codex: "xiaomi/mimo-v2.5-pro"
    gpt-5.3-codex-spark: "xiaomi/mimo-v2.5"
    gpt-5.2: "xiaomi/mimo-v2.5"

    # Fallback for unknown bare model names
    "*": "xiaomi/mimo-v2.5-pro"

providers:
  xiaomi:
    spec: xiaomi
    credentials:
      api_key: ${MIMO_API_KEY}
    endpoint:
      base_url: https://api.xiaomimimo.com/v1

session:
  backend: sqlite
  sqlite:
    path: ./data/sessions.xiaomi.db

trace:
  enabled: true
  path: ./data/trace.xiaomi.db
  capture_payload: true
  payload_max_bytes: 1048576
