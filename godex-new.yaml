  max_queue_size: 100
  flush_interval_ms: 5000
  batch_size: 50
  capture_payload: true
  payload_max_bytes: 10485760
plugins:
  paths:
    - D:/Documents/VibeCoding/GodeX/studio/dist/plugin.js
