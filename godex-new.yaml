server:
  port: 5679
  host: 127.0.0.1
default_provider: minimax
providers:
  minimax:
    spec: minimax
    credentials:
      api_key: gw
    endpoint:
      base_url: https://minnimax.chat/v1
models:
  aliases:
    "minimax-m3": minimax/MiniMax-M3
session:
  backend: sqlite
  sqlite:
    path: D:/Documents/VibeCoding/GodeX/.godex-new/data/session.db
