# godex.yaml — Default Godex configuration

server:
  port: 5678

default_provider: zhipu

providers:
  zhipu:
    api_key: ${ZHIPU_API_KEY}
    base_url: https://open.bigmodel.cn/api/coding/paas/v4
    models:
      gpt-5.5: glm-5.1
      gpt-5.4: glm-5.1
      gpt-5: glm-5.1
      gpt-5-mini: glm-5-turbo
      gpt-4o: glm-4.7
      gpt-4o-mini: glm-4.7-flash
      "*": glm-5.1

session:
  backend: sqlite
  sqlite:
    path: ./data/sessions.db

logging:
  level: info

  console:
    enabled: true
    level: info
    pretty: true

  file:
    enabled: true
    level: debug
    dir: ~/.godex/logs
    filename: godex.log
