server:
  port: 5678
  host: 0.0.0.0
default_provider: deepseek
models:
  enabled:
    - provider: minnimax.chat
      model: MiniMax-M2.7
      context_window: 204800
      max_tokens: 131072
      capabilities:
        text: true
        image_input: true
        tool_use: true
        stream: true
    - provider: minnimax.chat
      model: MiniMax-M2.7-highspeed
      context_window: 204800
      max_tokens: 131072
      capabilities:
        text: true
        image_input: true
        tool_use: true
        stream: true
    - provider: minnimax.chat
      model: MiniMax-M3
      context_window: 1000000
      max_tokens: 131072
      capabilities:
        text: true
        image_input: true
        audio_input: true
        tool_use: true
        stream: true
  discovered: []
providers:
  minnimax.chat:
    spec: minimax
    credentials:
      api_key: ${MINIMAX_API_KEY}
    endpoint:
      base_url: https://minnimax.chat/v1
    timeout_ms: 120000
  deepseek:
    spec: deepseek
    credentials:
      api_key: ${DEEPSEEK_API_KEY}
    endpoint:
      base_url: https://api.deepseek.com
  xiaomi:
    spec: xiaomi
    credentials:
      api_key: ${MIMO_API_KEY}
    endpoint:
      base_url: https://api.xiaomimimo.com/v1
  zhipu:
    spec: zhipu
    credentials:
      api_key: ${ZHIPU_API_KEY}
    endpoint:
      base_url: https://open.bigmodel.cn/api/coding/paas/v4
  minimax:
    spec: minimax
    credentials:
      api_key: ${MINIMAX_API_KEY}
    endpoint:
      base_url: https://api.minimaxi.com/v1
    timeout_ms: 120000
session:
  backend: sqlite
  sqlite:
    path: ./data/sessions.db
trace:
  enabled: true
  path: ./data/trace.db
  max_queue_size: 10000
  flush_interval_ms: 1000
  batch_size: 100
  capture_payload: true
  payload_max_bytes: 1048576
logging:
  level: info
  console:
    enabled: true
    level: debug
    pretty: true
  file:
    enabled: true
    level: debug
    dir: ~/.godex/logs
    filename: godex.log
