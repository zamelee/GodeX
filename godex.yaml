# =============================================================================
# GodeX Configuration — OpenAI Responses API Gateway
# =============================================================================
# 配置文件查找顺序:
#   1. 当前目录 ./godex.yaml
#   2. ~/.godex/config.yaml
#
# 环境变量: 使用 ${VAR_NAME} 语法引用，对 providers 配置生效。
# 命令行覆盖: --port, --host, --log-level 可覆盖对应字段。

# ---------------------------------------------------------------------------
# 服务器
# ---------------------------------------------------------------------------
server:
  port: 5678
  host: 0.0.0.0       # 监听地址 (默认 0.0.0.0, 环境变量 GODEX_HOST)
  # idle_timeout: 0   # 空闲连接超时秒数 (0 = 不超时)

# ---------------------------------------------------------------------------
# 默认 Provider — 当请求的 model 不含 "/" 且别名未命中时使用
# ---------------------------------------------------------------------------
default_provider: deepseek

# ---------------------------------------------------------------------------
# 模型别名 — 将 OpenAI 模型名映射到实际的 provider/model
# ---------------------------------------------------------------------------
# 解析规则 (按优先级):
#   1. model 含 "/"   → 直接解析为 provider/model，不查别名，透传
#   2. model 不含 "/" → 查 aliases 精确匹配
#   3. 未命中         → 查 "*" 通配符
#   4. 无 "*"         → 兜底: default_provider/原始model名
#
# 别名值格式: <provider>/<upstream-model>
#   - provider 必须在 providers 中已注册
#   - upstream-model 为上游 API 实际使用的模型名
# ---------------------------------------------------------------------------
models:
  enabled:
    - provider: minnimax.chat
      model: MiniMax-M2.7
      context_window: 204800
      max_tokens: 131072
    - provider: minnimax.chat
      model: MiniMax-M2.7-highspeed
      context_window: 204800
      max_tokens: 131072
    - provider: minnimax.chat
      model: MiniMax-M3
      context_window: 1000000
      max_tokens: 131072
  discovered: []
# ---------------------------------------------------------------------------
# Provider 列表 — 已启用的上游 LLM 服务商
# ---------------------------------------------------------------------------
# 内置 provider 名称: deepseek, xiaomi, minimax, zhipu。
# 只有在这里配置过的 provider 才能被模型别名或 "provider/model" 选择器使用。
# spec 指向 provider 实现；endpoint.base_url 使用上游 Chat Completions 根地址，
# 具体路径由 GodeX 拼接。
#
# 单 provider 快速启动配置: godex.deepseek.yaml / godex.xiaomi.yaml / godex.minimax.yaml / godex.zhipu.yaml
# ---------------------------------------------------------------------------
providers:

  minnimax.chat:
    spec: minimax
    credentials:
      api_key: ${YOUR_API_KEY}
    endpoint:
      base_url: https://minnimax.chat/v1
    timeout_ms: 120000
  deepseek:
    spec: deepseek
    # DeepSeek 根地址不要追加 /v1，GodeX 会拼接 chat/completions。
    credentials:
      api_key: ${DEEPSEEK_API_KEY}
    endpoint:
      base_url: https://api.deepseek.com
  xiaomi:
    spec: xiaomi
    credentials:
      api_key: ${MIMO_API_KEY}
    endpoint:
      base_url: https://api.xiaomimimo.com/v1
  zhipu:
    spec: zhipu
    # 智谱 OpenAI-compatible 根地址
    credentials:
      api_key: ${ZHIPU_API_KEY}
    endpoint:
      base_url: https://open.bigmodel.cn/api/coding/paas/v4
  minimax:
    spec: minimax
    credentials:
      api_key: ${YOUR_API_KEY}
    endpoint:
      base_url: https://api.minimaxi.com/v1
    timeout_ms: 120000
# ---------------------------------------------------------------------------
# 会话存储 — 多轮对话的 previous_response_id 链
# ---------------------------------------------------------------------------
session:
  backend: sqlite                    # memory | sqlite
  sqlite:
    path: ./data/sessions.db         # SQLite 数据库路径 (仅 sqlite 模式)

# ---------------------------------------------------------------------------
# Trace DB — 请求/响应/流事件与真实 usage 观测，默认开启
# ---------------------------------------------------------------------------
# 启用后会在独立的 trace.db 中记录:
#   - 上游请求/响应的 payload 摘要 (hash + 字节数, 可选完整 payload)
#   - 流式事件追踪 (raw + transformed SSE chunks)
#   - Token 使用量 (含 cached_tokens / cache_hit_ratio)
#
# 所有 trace 记录通过异步有界队列写入，不阻塞 /v1/responses。
# 关闭时 (enabled: false) 零开销 — 直接使用 NoopTraceRecorder 丢弃所有事件。
# ---------------------------------------------------------------------------
trace:
  enabled: true                     # 是否启用 (默认 true)
  path: ./data/trace.db             # SQLite trace 数据库路径 (开发环境默认)
                                    #   非开发环境默认 ~/.godex/data/trace.db
  max_queue_size: 10000             # 异步队列最大长度，满时丢弃并 warn
  flush_interval_ms: 1000           # 后台批量 flush 间隔 (毫秒)
  batch_size: 100                   # 单次 flush 最大记录数
  capture_payload: true             # 是否存储完整 payload JSON (默认 false)
                                    #   false: 只记录 payload_hash + payload_bytes
                                    #   true:  超过 payload_max_bytes 时截断并标记
  payload_max_bytes: 1048576        # capture_payload=true 时单条 payload 最大字节数

# ---------------------------------------------------------------------------
# 日志
# ---------------------------------------------------------------------------
logging:
  level: info                        # trace | debug | info | warn | error

  console:
    enabled: true                    # 启用控制台日志
    level: debug                     # 控制台日志级别 (默认继承 logging.level)
    pretty: true                     # 结构化日志的人类可读输出

  file:
    enabled: true                    # 启用文件日志
    level: debug                     # 文件日志级别 (默认继承 logging.level)
    dir: ~/.godex/logs               # 日志目录
    filename: godex.log              # 日志文件名
    # max_size: 10485760             # 单文件最大字节数 (默认无限制)
    # max_files: 5                   # 保留的历史文件数 (默认无限制)
