<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui; font-size: 13px; min-width: 320px; padding: 12px; margin: 0; background: #1e1e1e; color: #ccc; }
    h3 { margin: 0 0 10px; color: #fff; font-size: 14px; }
    .status { font-size: 12px; padding: 6px 10px; background: #2d2d2d; border-radius: 4px; margin-bottom: 10px; }
    .status.ok { color: #4caf50; }
    .status.err { color: #f44336; }
    button { width: 100%; padding: 7px; margin: 3px 0; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 12px; }
    button:hover { background: #444; }
    input { width: 100%; padding: 6px; background: #2d2d2d; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; margin: 3px 0; }
    .section { margin-top: 10px; }
    .label { font-size: 11px; color: #888; margin-bottom: 3px; }
    pre { font-size: 11px; background: #2d2d2d; padding: 6px; border-radius: 4px; overflow: auto; max-height: 120px; margin: 5px 0 0; }
  </style>
</head>
<body>
  <h3>Codex Browser Control</h3>
  <div id="status" class="status">Connecting...</div>

  <div class="section">
    <div class="label">URL</div>
    <div id="url" style="font-size:11px;word-break:break-all;padding:4px;background:#2d2d2d;border-radius:3px;"></div>
  </div>

  <div class="section">
    <div class="label">Selector</div>
    <input id="selector" placeholder="e.g. #idInput, button.submit">
    <input id="text_input" placeholder="text to type (optional)">
    <button onclick="doClick()">Click</button>
    <button onclick="doType()">Type Text</button>
  </div>

  <div class="section">
    <div class="label">Output</div>
    <pre id="output">—</pre>
  </div>

  <script src="popup.js"></script>
</body>
</html>
