# =============================================================================
# GodeX Configuration — Zhipu (智谱) Provider
# =============================================================================
# 快速启动: godex serve --config ./godex.zhipu.yaml
# 环境变量: export ZHIPU_API_KEY=<your-key>

default_provider: zhipu

models:
  aliases:
    # -------------------------------------------------------------------------
    # Codex-compatible model aliases
    # -------------------------------------------------------------------------
    gpt-5.5: "zhipu/glm-5.2"
    gpt-5.4: "zhipu/glm-5-turbo"
    gpt-5.4-mini: "zhipu/glm-4.7"
    gpt-5.3-codex: "zhipu/glm-5.2"
    gpt-5.3-codex-spark: "zhipu/glm-4.5-air"
    gpt-5.2: "zhipu/glm-4.7"
    # Fallback for unknown bare model names
    "*": "zhipu/glm-5.2"

providers:
  zhipu:
    spec: zhipu
    credentials:
      api_key: ${ZHIPU_API_KEY}
    endpoint:
      base_url: https://open.bigmodel.cn/api/coding/paas/v4

session:
  backend: sqlite
  sqlite:
    path: ./data/sessions.zhipu.db

trace:
  enabled: true
  path: ./data/trace.zhipu.db
  capture_payload: true
  payload_max_bytes: 1048576
